<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <header>
    <nav class="navbar navbar-expand navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <img src="{{ url_for('static', filename='logo.png') }}" alt="logo" />
        </a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link {{ 'active' if active_page == 'home' }}"
                 aria-current="{{ 'page' if active_page == 'home' }}"
                 href="/">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {{ 'active' if active_page == 'message' }}"
                 aria-current="{{ 'page' if active_page == 'message' }}"
                 href="/message.html">Send message</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {{ 'active' if active_page == 'read' }}"
                 aria-current="{{ 'page' if active_page == 'read' }}"
                 href="/read">Read messages</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    {% block header %}{% endblock %}
  </header>

  {% block content %}{% endblock %}
</body>
</html>
